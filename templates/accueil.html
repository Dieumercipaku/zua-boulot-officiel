{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <!-- 🔥 SLIDER -->
    <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">

        <div class="carousel-inner">

            <div class="carousel-item active">
                <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d" class="d-block w-100" height="400">
                <div class="carousel-caption">
                    <h3>Bienvenue sur Zua Boulot</h3>
                    <p>Trouve du travail facilement</p>
                </div>
            </div>

            <div class="carousel-item">
                <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d" class="d-block w-100" height="400">
                <div class="carousel-caption">
                    <h3>Opportunités pour tous</h3>
                    <p>Connecte-toi avec des entreprises</p>
                </div>
            </div>

            <div class="carousel-item">
                <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7" class="d-block w-100" height="400">
                <div class="carousel-caption">
                    <h3>Développe ta carrière</h3>
                    <p>Zua Boulot t’accompagne</p>
                </div>
            </div>

        </div>

        <!-- boutons -->
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>

    </div>

    <!-- TEXTE -->
    <div class="text-center mt-4">
        <h1 class="text-primary">Bienvenue sur Zua Boulot 🚀</h1>
        <p class="lead">Plateforme pour trouver du travail facilement</p>
    </div>

</div>

{% endblock %}
