{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Zua Boulot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- 🔥 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">

        <!-- LOGO + NOM -->
        <a class="navbar-brand d-flex align-items-center" href="/">
            <img src="{% static 'images/logo.png' %}" width="40" height="40" class="me-2 rounded-circle">
            <strong>Zua Boulot</strong>
        </a>

        <!-- MENU -->
        <div>
            <a href="/membres/" class="btn btn-success btn-sm me-2">Membres</a>
            <a href="/ajouter/" class="btn btn-primary btn-sm me-2">Ajouter</a>
            <a href="/dashboard/" class="btn btn-warning btn-sm">Dashboard</a>
        </div>

    </div>
</nav>

<!-- 🔥 CONTENU -->
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<!-- 🔥 FOOTER (option pro) -->
<footer class="bg-dark text-white text-center mt-5 p-3">
    <p class="mb-0">© 2026 Zua Boulot - Ensemble contre le chômage 🇨🇩</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h2>Créer un compte</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="btn btn-success">S'inscrire</button>
    </form>

    <p>Déjà un compte ? <a href="/accounts/login/">Se connecter</a></p>
</div>
{% endblock %}
