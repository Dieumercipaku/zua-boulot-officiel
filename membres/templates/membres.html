{% extends 'base.html' %}

{% block content %}

<h2 class="mb-3">Liste des membres ASBL</h2>

<a href="/ajouter/" class="btn btn-success mb-3">
    ➕ Ajouter un membre
</a>

<table class="table table-striped table-hover">
    <thead class="table-dark">
        <tr>
            <th>Nom</th>
            <th>Postnom</th>
            <th>Prénom</th>
            <th>Fonction</th>
        </tr>
    </thead>

    <tbody>
        {% for m in membres %}
        <tr>
            <td>{{ m.nom }}</td>
            <td>{{ m.postnom }}</td>
            <td>{{ m.prenom }}</td>
            <td>{{ m.fonction }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">Aucun membre enregistré</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
<td>
    <a href="/modifier/{{ m.id }}/" class="btn btn-warning btn-sm">
        ✏️ Modifier
    </a>

    <a href="/supprimer/{{ m.id }}/" class="btn btn-danger btn-sm"
       onclick="return confirm('Supprimer ce membre ?')">
        🗑️ Supprimer
    </a>
</td>
{% endblock %}
